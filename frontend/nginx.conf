server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket proxy — must come before the /api/ block so the more-specific
    # path wins. Handles the Upgrade handshake required by RFC 6455.
    location /api/v1/ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # keep long-lived WS connections alive
    }

    # REST API proxy — forwards all /api/ traffic to the backend container.
    # Backend is not exposed on the host in production; nginx is the sole
    # entry point.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — long-lived cache because Vite fingerprints filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — send all non-file requests to index.html so React Router
    # can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
