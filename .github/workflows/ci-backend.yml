name: Backend CI

on:
  push:
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

# Cancel any in-progress run on the same branch when a newer commit is pushed.
# Keeps resource usage low on fast-moving branches without affecting main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and type-check run without any service dependencies so they can
  # execute in parallel with the test job for faster overall feedback.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          # Include both files: requirements-dev.txt references requirements.txt
          # via -r, so a change to either should bust the cache.
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Lint (ruff)
        run: ruff check .
        working-directory: backend

      - name: Format check (ruff)
        run: ruff format --check .
        working-directory: backend

      - name: Type check (mypy)
        run: mypy app/
        working-directory: backend

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: noted
          POSTGRES_PASSWORD: noted
          POSTGRES_DB: noted_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          # Include both files: requirements-dev.txt references requirements.txt
          # via -r, so a change to either should bust the cache.
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: Run tests
        run: pytest -v --cov=app --cov-report=xml
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://noted:noted@localhost:5432/noted_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret

  # Build and push the production image only when both lint and tests pass
  # on the main branch. Images are tagged with the commit SHA (for traceability
  # and rollbacks) and :latest (for convenience).
  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Buildx is required for the GHA cache backend used below.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags and OCI labels from git metadata.
      # Produces: sha-<7-char-sha> on every push, :latest only on main.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/noted-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in GitHub Actions cache — greatly speeds up
          # rebuilds when only source code (not dependencies) changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max
