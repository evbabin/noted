name: Frontend CI

on:
  push:
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Lint (eslint)
        run: pnpm lint
        working-directory: frontend

      # CI=true tells Vitest to run once and exit rather than entering watch
      # mode. GitHub Actions sets this automatically, but we set it explicitly
      # so the behaviour is obvious and works in other CI environments too.
      - name: Unit tests (vitest)
        run: pnpm exec vitest run
        working-directory: frontend
        env:
          CI: 'true'

      # Runs tsc + vite build — validates types and ensures the bundle compiles.
      - name: Build check
        run: pnpm build
        working-directory: frontend

  # Build and push the production image only when tests pass on the main branch.
  # VITE_* build args are injected from repository secrets so the published
  # image contains the correct production URLs baked into the JS bundle.
  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/noted-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_API_BASE_URL is always /api/v1 (nginx proxies it), so it needs
          # no secret. WS URL and Google OAuth client ID are deployment-specific.
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
