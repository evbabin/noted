[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# URL is intentionally blank — alembic/env.py reads it from DATABASE_URL at runtime.
# Leaving a hardcoded localhost default here used to let mis-configured deployments
# silently connect to the wrong DB; better to fail loudly.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
