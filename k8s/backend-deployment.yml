apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: noted
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-user/noted-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: noted-config
            - secretRef:
                name: noted-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: noted
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
