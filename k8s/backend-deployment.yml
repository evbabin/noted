apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: noted
spec:
  replicas: 1
  # Single-replica deployment on a small node: use Recreate so we don't briefly run two
  # pods (doubling memory) during a rollout. Trade-off is ~30s of downtime per deploy,
  # which is acceptable for this footprint.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Allow open WebSocket connections to drain before the pod is killed.
      # The ingress proxy-read-timeout is 3600s, but in practice most connections
      # will close within seconds of SIGTERM once the client sees the server going away.
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: ghcr.io/evbabin/noted/noted-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: noted-config
            - secretRef:
                name: noted-secrets
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          # readinessProbe: gates traffic — pod removed from Service endpoints if this fails.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          # livenessProbe: restarts the pod if it becomes hung/deadlocked.
          # Higher failureThreshold so transient slowness under load doesn't trigger a restart.
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: noted
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
