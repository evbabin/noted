# IMPORTANT: Never commit real secrets to source control.
# This file contains placeholder values for documentation purposes only.
#
# Recommended approaches for production:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets): encrypt secrets
#     client-side; safe to commit the SealedSecret CRD. Decrypt only happens in-cluster.
#   - External Secrets Operator: sync from AWS Secrets Manager, Vault, GCP Secret Manager, etc.
#
# To bootstrap manually (dev/staging only):
#   kubectl create secret generic noted-secrets -n noted \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://noted:PASS@postgres:5432/noted' \
#     --from-literal=REDIS_URL='redis://redis:6379/0' \
#     --from-literal=JWT_SECRET_KEY="$(openssl rand -hex 32)" \
#     ...
apiVersion: v1
kind: Secret
metadata:
  name: noted-secrets
  namespace: noted
type: Opaque
stringData:
  # Must match the POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB in postgres-statefulset.yml.
  DATABASE_URL: "postgresql+asyncpg://noted:CHANGEME@postgres:5432/noted"
  # POSTGRES_PASSWORD is read directly by the postgres StatefulSet container.
  POSTGRES_PASSWORD: "CHANGEME"
  REDIS_URL: "redis://redis:6379/0"
  # Generate with: openssl rand -hex 32
  JWT_SECRET_KEY: "CHANGEME-generate-with-openssl-rand-hex-32"
  GOOGLE_CLIENT_ID: "CHANGEME"
  GOOGLE_CLIENT_SECRET: "CHANGEME"
  # Set only the key for the AI provider configured in the ConfigMap (AI_PROVIDER).
  OPENAI_API_KEY: "CHANGEME"
  # GEMINI_API_KEY: "CHANGEME"
  # GROQ_API_KEY: "CHANGEME"
