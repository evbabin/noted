# PVC defined first — the Deployment below references it by name.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: noted
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: noted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          # RDB snapshot every 60 s if ≥1 key changed.
          # Persistence matters here: refresh tokens, rate-limit counters, and the ARQ job
          # queue all live in Redis. Losing Redis forces all users to re-login and drops
          # any queued quiz-generation jobs.
          command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: noted
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
