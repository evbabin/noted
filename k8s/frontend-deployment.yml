apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: noted
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Note: VITE_* environment variables are baked in at image build time by Vite.
      # Runtime env vars are not read by the frontend container — configure them via
      # build args in the CI/CD pipeline (Section 8.4) rather than here.
      containers:
        - name: frontend
          image: ghcr.io/your-user/noted-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: noted
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
