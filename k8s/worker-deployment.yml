apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: noted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-user/noted-backend:latest
          command: ["arq", "app.tasks.worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: noted-config
            - secretRef:
                name: noted-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
