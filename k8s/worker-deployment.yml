apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: noted
spec:
  replicas: 1
  # maxUnavailable: 0 prevents a new worker from starting before the old one has finished
  # its in-flight job and exited cleanly. ARQ workers catch SIGTERM and finish the current
  # task before shutting down, so a graceful overlap is preferred over hard interruption.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      # AI quiz generation tasks can run for 10–30 seconds. Give ARQ enough time to finish
      # the current job after receiving SIGTERM before the pod is force-killed.
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: ghcr.io/evbabin/noted/noted-backend:latest
          command: ["arq", "app.tasks.worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: noted-config
            - secretRef:
                name: noted-secrets
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "448Mi"
              cpu: "500m"
          # No HTTP readiness/liveness probes — ARQ workers expose no HTTP endpoint.
          # k8s will restart the container automatically if the process exits non-zero.
